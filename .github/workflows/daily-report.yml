# 文件路径: .github/workflows/daily_report.yml

name: Daily Trade Report

on:
  # 1. 定时触发：每天 UTC 时间 0 点（北京/香港时间早上 8 点）
  schedule:
    - cron: '0 0 * * *'
    
  # 2. 手动触发：允许你在 Actions 页面手动点击 "Run workflow"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    # 关键：赋予工作流向仓库写入内容的权限
    permissions:
      contents: write

    steps:
      # 第 1 步：拉取你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第 2 步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 第 3 步：安装 Python 依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests

      # 第 4 步：运行你的 Python 脚本
      - name: Run daily report script
        run: python analysis/daily_report.py

      # 第 5 步：提交并推送报告文件
      - name: Commit and push report
        run: |
          # 配置 Git 用户信息
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 添加所有在 reports/ 目录下的新文件或修改
          git add reports/
          
          # 提交更改。如果没有任何更改，`git commit` 会失败，
          # `|| echo "No changes to commit"` 会捕获这个错误并打印信息，防止工作流因没有新文件而失败
          git commit -m "Auto-generated daily trade report: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          # 推送到当前分支
          git push
