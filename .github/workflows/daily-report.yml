name: Daily Trade Report

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（香港時間早上 8:00）
  workflow_dispatch:     # 允許手動觸發

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 強制遷移到 Node.js 24

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests

    - name: Run daily report script
      run: python analysis/daily_report.py

    - name: Commit and push report
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add reports/
        git commit -m "Auto-generated daily trade report $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
