name: Daily Trade Report

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（香港時間早上 8:00）
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2  # 升級到最新 patch 版

    - name: Set up Python
      uses: actions/setup-python@v5.3.0  # 升級到最新 patch 版
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests

    - name: Run daily report script
      run: python analysis/daily_report.py

    - name: Commit and push report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 確保 push 權限
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add reports/
        git commit -m "Auto-generated daily trade report $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
